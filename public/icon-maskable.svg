<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <!-- マスカブル用: 背景は全面、主要素は中央80%の安全領域内に収める -->
  <rect width="512" height="512" fill="url(#bgm)"/>
  <circle cx="256" cy="256" r="120" fill="#ffffff" opacity="0.10"/>
  <text x="50%" y="52%" dominant-baseline="central" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',system-ui,sans-serif"
        font-weight="900" font-size="220" fill="#ffffff">英</text>
